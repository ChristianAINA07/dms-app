# ===================================================================
# Configuration de la connexion à la base de données MySQL (WampServer)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/dms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ===================================================================
# Configuration de Hibernate / JPA (Génération automatique des tables)
# ===================================================================
# Le mode 'update' crée ou modifie automatiquement les tables sans supprimer les données existantes
spring.jpa.hibernate.ddl-auto=update

# Permet d'afficher les requêtes SQL dans la console de VS Code pour le débogage
spring.jpa.show-sql=true

# Formate le code SQL affiché pour le rendre plus lisible
spring.jpa.properties.hibernate.format_sql=true

# Spécifie le dialecte MySQL à utiliser pour la génération du code de la base de données
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Port de l'application (évite les conflits avec le port 8080 par défaut)
server.port=8081
# Désactiver temporairement la sécurité pour le premier démarrage du projet
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
# Configuration de la taille maximale des fichiers pour l'upload (Enterprise-Grade)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB



